<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AoTR Wiki</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #050508);
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND ANIMÉ */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg,#00ffcc,#3b82f6,#a855f7,#00ffcc);
  animation: move 12s linear infinite;
  opacity: 0.08;
  z-index: -1;
}

@keyframes move {
  0% {transform: translate(0,0);}
  100% {transform: translate(-50%,-50%);}
}

header {
  text-align: center;
  padding: 30px;
  background: linear-gradient(90deg,#00ffcc,#3b82f6,#a855f7);
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

#search {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-bottom: 15px;
  background: #0f172a;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap: 12px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 14px;
  cursor: pointer;
  border: 1px solid #1f2937;
  transition: 0.25s;
  text-align: center;
}

.card:hover {
  transform: scale(1.06);
  border-color: #00ffcc;
}

.popup {
  display: none;
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.popup-content {
  background:#0f172a;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:800px;
  border:1px solid #00ffcc;
}

.close {
  float:right;
  cursor:pointer;
  color:red;
}
h2 {color:#00ffcc;}
p {margin:6px 0;}
</style>
</head>

<body>

<header>
<h1>⚔️ AoTR Wiki</h1>
<p>FULL BUILDS COMPLETE</p>
</header>

<div class="container">

<input id="search" placeholder="Search..." onkeyup="search()">

<div class="grid">

<div class="card" onclick="openBuild('odm_general')">ODM Général</div>
<div class="card" onclick="openBuild('odm_ackerman')">Ackerman ODM</div>
<div class="card" onclick="openBuild('ts_general')">TS Général</div>
<div class="card" onclick="openBuild('ts_ackerman')">Ackerman TS</div>
<div class="card" onclick="openBuild('attack_titan')">Attack Titan</div>
<div class="card" onclick="openBuild('armored_titan')">Armored Titan</div>
<div class="card" onclick="openBuild('yeager')">Yeager Family</div>
<div class="card" onclick="openBuild('buffer')">Buffer</div>

</div>
</div>

<div class="popup" id="popup">
<div class="popup-content">
<span class="close" onclick="closePopup()">X</span>
<div id="content"></div>
</div>
</div>

<script>

function openBuild(t){

let c="";

/* ================= ODM ================= */
if(t=="odm_general"){
c=`
<h2>ODM Build (Général)</h2>
<p><b>Perks:</b> Perfect Form • Kengo • Immortal • Font of Inspiration</p>
<p><b>Bonus:</b> Invincible • Peerless Commander</p>
<p><b>Memories:</b> Gambler • Tactician • Flashstep • Crescendo</p>
<p><b>Skills:</b> Black Flare • Order Rage • Lethal Tempo • Family Skill</p>
<p><b>Artifacts:</b> Feathered Bicorn + Crystal Necklace</p>
<p><b>Paths:</b> Support CD • ODM • HP</p>`;
}

if(t=="odm_ackerman"){
c=`
<h2>Ackerman ODM</h2>
<p><b>Perks:</b> Perfect Form • Kengo • Immortal • Font of Inspiration • Black Flash</p>
<p><b>Memories:</b> Gambler • Apotheosis • Flashstep • Tactician • Crescendo</p>
<p><b>Skills:</b> Black Flare • Order Rage • Rage Mode • Swift Strikes • Let It Rip</p>
<p><b>Artifacts:</b> Feathered Bicorn + Crystal Necklace</p>`;
}

/* ================= TS ================= */
if(t=="ts_general"){
c=`
<h2>Thunder Spear</h2>
<p><b>Perks:</b> Maximum Firepower • Kengo • Immortal</p>
<p><b>Memories:</b> Afterimages • Supernova • Tactician • Crescendo</p>
<p><b>Skills:</b> Black Flare • Red Flare • Dual Shot • Revolving Pierce</p>
<p><b>Artifacts:</b> Feathered Bicorn + Crystal Necklace</p>`;
}

if(t=="ts_ackerman"){
c=`
<h2>Ackerman TS</h2>
<p><b>Perks:</b> Maximum Firepower • Kengo • Immortal • Everlasting Flame</p>
<p><b>Skills:</b> Black Flare • Rage Mode • Lightning Bolt • Thunder Barrage</p>`;
}

/* ================= TITANS ================= */
if(t=="attack_titan"){
c=`
<h2>Attack Titan</h2>
<p><b>Perks:</b> Founder's Blessing • Adaptation • Soulfeed • Art of War</p>
<p><b>Memories:</b> Apotheosis • Gambler • Quakestrike • Furyforge • Stormcharged</p>
<p><b>Skills:</b> Shifting • Flashbang • Dual Shot</p>
<p><b>Titan Skills:</b> Hardening • Stomp • Roar</p>`;
}

if(t=="armored_titan"){
c=`
<h2>Armored Titan</h2>
<p><b>Skills:</b> Earthbreaker • Phase Shift • Unstoppable Charge</p>`;
}

if(t=="yeager"){
c=`
<h2>Yeager Family</h2>
<p><b>Skills:</b> Berserk • Hardening • Roar • Shifting</p>`;
}

if(t=="buffer"){
c=`
<h2>Buffer Build</h2>
<p><b>Perks:</b> Kengo • Immortal • Font of Inspiration</p>
<p><b>Skills:</b> Red Flare • Support CD • Family Skill</p>`;
}

document.getElementById("content").innerHTML=c;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function search(){
let i=document.getElementById("search").value.toLowerCase();
let c=document.getElementsByClassName("card");
for(let x of c){
x.style.display=x.innerText.toLowerCase().includes(i)?"":"none";
}
}

</script>

</body>
</html>
