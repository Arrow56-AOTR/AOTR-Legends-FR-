<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AoTR Wiki</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #050508);
  color: white;
}

header {
  text-align: center;
  padding: 30px;
  background: linear-gradient(90deg, #00ffcc, #3b82f6, #a855f7);
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

#search {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-bottom: 15px;
  background: #0f172a;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 14px;
  cursor: pointer;
  border: 1px solid #1f2937;
  transition: 0.2s;
  text-align: center;
}

.card:hover {
  transform: scale(1.05);
  border-color: #00ffcc;
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}

.popup {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: #0f172a;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 750px;
  border: 1px solid #00ffcc;
}

.close {
  float: right;
  cursor: pointer;
  color: red;
  font-weight: bold;
}

h2 { color: #00ffcc; }
</style>
</head>

<body>

<header>
  <h1>⚔️ AoTR WIKI</h1>
  <p>Builds complets + META</p>
</header>

<div class="container">

<input id="search" placeholder="Search builds..." onkeyup="search()">

<div class="grid">

  <div class="card" onclick="openBuild('odm_general')">
    <img src="images/ODM.jpg">
    <b>ODM Build</b>
  </div>

  <div class="card" onclick="openBuild('odm_ackerman')">
    <img src="images/Ackerman.jpg">
    <b>Ackerman ODM</b>
  </div>

  <div class="card" onclick="openBuild('ts_general')">
    <img src="images/Ts.jpg">
    <b>Thunder Spear</b>
  </div>

  <div class="card" onclick="openBuild('ts_ackerman')">
    <img src="images/Ackerman.jpg">
    <b>Ackerman TS</b>
  </div>

  <div class="card" onclick="openBuild('attack_titan')">
    <img src="images/attack.jpg">
    <b>Attack Titan</b>
  </div>

  <div class="card" onclick="openBuild('armored_titan')">
    <img src="images/Armor.jpg">
    <b>Armored Titan</b>
  </div>

  <div class="card" onclick="openBuild('yeager')">
    <img src="images/Yeager.jpg">
    <b>Yeager Family</b>
  </div>

  <div class="card" onclick="openBuild('buffer')">
    <img src="images/Buff.jpg">
    <b>Buffer Build</b>
  </div>

</div>
</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close" onclick="closePopup()">X</span>
    <div id="content"></div>
  </div>
</div>

<script>

function openBuild(type){
let content="";

/* ODM */
if(type=="odm_general"){
content=`
<h2>ODM BUILD</h2>
<p><b>Perks:</b> Perfect Form • Kengo • Immortal • Font of Inspiration</p>
<p><b>Memories:</b> Gambler • Tactician • Flashstep • Crescendo</p>
<p><b>Skills:</b> Black Flare • Order Rage • Lethal Tempo • Red Flare</p>
<p><b>Artifacts:</b> Feathered Bicorn • Crystal Necklace</p>
<p><b>Paths:</b> Support CD • ODM Damage • HP Defense</p>
`;
}

/* ACK ODM */
if(type=="odm_ackerman"){
content=`
<h2>ACKERMAN ODM</h2>
<p><b>Perks:</b> Perfect Form • Kengo • Black Flash • Immortal</p>
<p><b>Memories:</b> Gambler • Apotheosis • Flashstep • Tactician</p>
<p><b>Skills:</b> Rage Mode • Swift Strikes • Black Flare</p>
<p><b>Artifacts:</b> Feathered Bicorn • Crystal Necklace</p>
<p><b>Paths:</b> ODM Damage • CD Reduction</p>
`;
}

/* TS */
if(type=="ts_general"){
content=`
<h2>THUNDER SPEAR</h2>
<p><b>Perks:</b> Maximum Firepower • Kengo • Immortal</p>
<p><b>Memories:</b> Afterimages • Supernova • Tactician</p>
<p><b>Skills:</b> Red Flare • Dual Shot • Revolving Pierce</p>
<p><b>Artifacts:</b> Feathered Bicorn • Crystal Necklace</p>
<p><b>Paths:</b> TS Damage • Support CD</p>
`;
}

/* ACK TS */
if(type=="ts_ackerman"){
content=`
<h2>ACKERMAN TS</h2>
<p><b>Perks:</b> Maximum Firepower • Kengo • Everlasting Flame</p>
<p><b>Skills:</b> Thunder Barrage • Lightning Bolt • Black Flare</p>
<p><b>Artifacts:</b> Feathered Bicorn • Crystal Necklace</p>
`;
}

/* TITANS */
if(type=="attack_titan"){
content=`
<h2>ATTACK TITAN</h2>
<p><b>Perks:</b> Founder's Blessing • Adaptation • Soulfeed • Art of War</p>
<p><b>Memories:</b> Apotheosis • Gambler • Quakestrike • Furyforge</p>
<p><b>Skills:</b> Shifting • Flashbang • Dual Shot</p>
<p><b>Titan Skills:</b> Hardening • Roar • Stomp • Uppercut</p>
<p><b>Artifacts:</b> Attack Scars • Crystal Necklace</p>
<p><b>Paths:</b> Offense • Tank</p>
`;
}

if(type=="armored_titan"){
content=`
<h2>ARMORED TITAN</h2>
<p><b>Perks:</b> Adaptation • Soulfeed • Art of War</p>
<p><b>Skills:</b> Combustive Counter • Flashbang</p>
<p><b>Titan Skills:</b> Earthbreaker • Roar • Charge</p>
<p><b>Artifacts:</b> Armored Scars • Scorched Cloak</p>
`;
}

if(type=="yeager"){
content=`
<h2>YEAGER FAMILY</h2>
<p><b>Perks:</b> Founder's Blessing • Immortal</p>
<p><b>Skills:</b> Shifting • Berserk • Hardening</p>
<p><b>Titan Skills:</b> Roar • Stomp • Corkscrew Punch</p>
<p><b>Artifacts:</b> Attack Scars • Cloak</p>
`;
}

if(type=="buffer"){
content=`
<h2>BUFFER BUILD</h2>
<p><b>Perks:</b> Kengo • Immortal • Peerless Commander</p>
<p><b>Skills:</b> Red Flare • Support CD</p>
<p><b>Artifacts:</b> Feathered Bicorn • Crystal Necklace</p>
`;
}

document.getElementById("content").innerHTML=content;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function search(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.getElementsByClassName("card");

for(let c of cards){
c.style.display=c.innerText.toLowerCase().includes(input)?"":"none";
}
}

</script>

</body>
</html>
